<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <title>INDEX</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 40px;
    font-size: 30px;
    font-family: Arial, Helvetica, sans-serif;
    background-color: rgb(163, 168, 134);
    color: aliceblue;
}

nav ul {
    display: flex;
    list-style: none;
}

nav ul li a {
    cursor: pointer;
    margin-right: 20px;
    list-style: none;
    text-decoration: none;
    color: aliceblue;
}

nav ul li a:hover {
    background-color: aliceblue;
    color: rgb(163, 168, 134);
    padding: 5px;
    border-radius: 10px 10px;
    -webkit-border-radius: 10px 10px;
    -moz-border-radius: 10px 10px;
    -ms-border-radius: 10px 10px;
    -o-border-radius: 10px 10px;
}

nav .logo {
    font-weight: bold;
    font-size: 50px;
}

.sec1,
.sec2,
.sec3,
.sec4 {
    height: 100vh;
    background-color: gray;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 100px;
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
}

footer {
    display: flex;
    justify-content: center;
    background-color: rgb(163, 168, 134);
    height: 40px;
    align-items: center;
}

form {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 500px;
    margin: 50px auto;
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 10px;
    background-color: #f9f9f9;
    color: black;
}

form div {
    display: flex;
    align-items: center;
    gap: 10px;
}

form label {
    font-size: 18px;
    min-width: 80px;
}

#name,
#message {
    flex: 1;
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 16px;
}

textarea {
    resize: vertical;
}

.labelofmale {
    margin-right: 15px;
}

input[type="radio"] {
    margin-right: 5px;
}
    </style>


</head>
<body>
    <nav>
        <div class="logo">
            LOGO
        </div>
        <ul>
            <li><a href="#Home">Home</a></li>
            <li><a href="#Achievements">Achievements</a></li>
            <li><a href="#About Us">About Us</a></li>
            <li><a href="#Contact">Contact</a></li>
        </ul>                          
    </nav>
    <div class="sections">
        <section id="Home" class="sec1">Welcome To This Website</section>
        <section id="Achievements" class="sec2">Achievements</section>
        <section id="About Us" class="sec3">About Us</section>
        <section id="Contact" class="sec4">
            <form>
                <div>
                    <label for="name">Name</label>
                    <input type="text" name="namee" id="name">
                </div>
                
                <div>
                    <input type="radio" id="male" name="genderee" value="male">
                    <label for="male" class="labelofmale"> male</label>
                    <input type="radio" id="female" name="genderee" value="female">
                    <label for="female">female</label>
                </div>

                <div>
                    <label for="message">Message:</label>
                    <textarea name="mess" id="message" rows="10" cols="40s" placeholder="write your message here ..."></textarea>
                </div>

                <div>
                    <input type="submit" value="Send" style="
                        padding: 10px 20px;
                        font-size: 18px;
                        border-radius: 5px;
                        border: none;
                        background-color: #4CAF50;
                        color: white;
                        cursor: pointer;">
                </div>

            </form>
        </section>
    </div>
    <footer>
        <p>&copy; 2026 My Website. All rights reserved.</p>
    </footer>
</body>
</html>
